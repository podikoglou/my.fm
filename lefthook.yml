pre-commit:
  commands:
    lint:
      glob: ".{js,jsx,ts,tsx,mjs,cjs}"
      run: bun run lint {staged_files}
    format:
      run: bun run fmt --no-error-on-unmatched-pattern {staged_files}
    typecheck:
      run: bun typecheck

commit-msg:
  commands:
    "lint commit message":
      run: bun run commitlint --edit {1}
